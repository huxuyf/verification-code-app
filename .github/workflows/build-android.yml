name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 授予执行权限
      run: chmod +x gradlew

    - name: 生成或验证 debug.keystore
      run: |
        if [ ! -f "app/debug.keystore" ]; then
          echo "🔑 生成 debug.keystore..."
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ debug.keystore 已生成"
        else
          echo "✅ debug.keystore 已存在"
        fi

    - name: 缓存 Gradle 依赖
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 清理旧的构建文件
      run: ./gradlew clean

    - name: 构建 Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: 验证 Debug APK
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ Debug APK 构建成功"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "❌ Debug APK 构建失败"
          exit 1
        fi

    - name: 构建 Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: 验证 Release APK
      run: |
        if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          echo "✅ Release APK 构建成功"
          ls -lh app/build/outputs/apk/release/app-release-unsigned.apk
        else
          echo "❌ Release APK 构建失败"
          exit 1
        fi

    - name: 上传 Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: 上传 Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: 生成构建报告
      run: |
        echo "## 🎉 构建完成" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📱 APK 文件信息" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### Debug 版本" >> $GITHUB_STEP_SUMMARY
        echo "- **文件名**: app-debug.apk" >> $GITHUB_STEP_SUMMARY
        echo "- **位置**: app/build/outputs/apk/debug/" >> $GITHUB_STEP_SUMMARY
        echo "- **签名**: 使用 debug.keystore 签名" >> $GITHUB_STEP_SUMMARY
        echo "- **安装**: 可以直接在 Android 设备上安装" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### Release 版本" >> $GITHUB_STEP_SUMMARY
        echo "- **文件名**: app-release-unsigned.apk" >> $GITHUB_STEP_SUMMARY
        echo "- **位置**: app/build/outputs/apk/release/" >> $GITHUB_STEP_SUMMARY
        echo "- **签名**: 未签名（需要手动签名）" >> $GITHUB_STEP_SUMMARY
        echo "- **安装**: 需要先签名才能安装" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 下载方式" >> $GITHUB_STEP_SUMMARY
        echo "1. 在 GitHub Actions 页面下载构建产物" >> $GITHUB_STEP_SUMMARY
        echo "2. 或使用 GitHub CLI: \`gh run download\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📱 安装说明" >> $GITHUB_STEP_SUMMARY
        echo "- **Debug APK**: 直接下载安装即可（推荐用于测试）" >> $GITHUB_STEP_SUMMARY
        echo "- **Release APK**: 需要先使用 \`jarsigner\` 或 \`apksigner\` 签名" >> $GITHUB_STEP_SUMMARY
        echo "- **系统要求**: Android 13 (API 33) 及以上" >> $GITHUB_STEP_SUMMARY
