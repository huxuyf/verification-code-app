name: Android Release Build

on:
  push:
    branches: [ "main" ] # 当 main 分支有代码提交时触发
  workflow_dispatch: # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-signed-release:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 授予执行权限
      run: chmod +x gradlew

    - name: 生成或验证 debug.keystore
      run: |
        if [ ! -f "app/debug.keystore" ]; then
          echo "🔑 生成 debug.keystore..."
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ debug.keystore 已生成"
        else
          echo "✅ debug.keystore 已存在"
        fi

    - name: 缓存 Gradle 依赖
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 清理旧的构建文件
      run: ./gradlew clean

    - name: 解密签名密钥
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
          echo "✅ 签名密钥已解密"
        else
          echo "⚠️ 未配置签名密钥，将构建未签名的 Release APK"
        fi

    - name: 创建 keystore.properties
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        # 检查所有必需的变量是否都已配置
        if [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
          echo "storePassword=$KEYSTORE_PASSWORD" > app/keystore.properties
          echo "keyPassword=$KEY_PASSWORD" >> app/keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> app/keystore.properties
          echo "storeFile=release-keystore.jks" >> app/keystore.properties
          echo "✅ keystore.properties 已创建"
        else
          echo "⚠️ 签名配置不完整，跳过创建 keystore.properties"
          echo "ℹ️ 需要配置的 Secrets: KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD"
        fi

    - name: 构建签名的 Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: 验证 Release APK
      run: |
        if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          echo "✅ Release APK 构建成功"
          ls -lh app/build/outputs/apk/release/app-release-unsigned.apk
        else
          echo "❌ Release APK 构建失败"
          exit 1
        fi

    - name: 设置 Android SDK 路径
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        # 查找 apksigner 的位置
        find $ANDROID_HOME -name "apksigner" -type f 2>/dev/null | head -5

    - name: 签名 Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -f "app/release-keystore.jks" ] && [ -n "$KEYSTORE_PASSWORD" ]; then
          echo "🔑 正在签名 Release APK..."

          # 查找并使用 apksigner
          APKSIGNER=$(find $ANDROID_HOME -name "apksigner" -type f 2>/dev/null | head -1)

          if [ -z "$APKSIGNER" ]; then
            echo "❌ 未找到 apksigner 工具"
            exit 1
          fi

          echo "使用 apksigner: $APKSIGNER"

          $APKSIGNER sign \
            --ks app/release-keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass env:KEYSTORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

          if [ $? -eq 0 ]; then
            echo "✅ APK 签名成功"
            $APKSIGNER verify --print-certs app/build/outputs/apk/release/app-release-signed.apk
          else
            echo "❌ APK 签名失败"
            exit 1
          fi
        else
          echo "⚠️ 未配置签名密钥或密码，跳过签名步骤"
          echo "ℹ️ 如需签名，请在 GitHub Secrets 中配置以下变量："
          echo "   - KEYSTORE_BASE64"
          echo "   - KEYSTORE_PASSWORD"
          echo "   - KEY_ALIAS"
          echo "   - KEY_PASSWORD"
        fi

    - name: 重命名 APK
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | awk -F'"' '{print $2}')
        VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | awk -F' ' '{print $2}')

        if [ -f "app/build/outputs/apk/release/app-release-signed.apk" ]; then
          # 已签名版本
          cp app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/verification-code-app-v${VERSION_NAME}-${VERSION_CODE}-signed.apk
          echo "✅ 已生成签名的 APK"
        elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          # 未签名版本
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/verification-code-app-v${VERSION_NAME}-${VERSION_CODE}-unsigned.apk
          echo "⚠️ 生成未签名的 APK"
        fi

    - name: 上传 Release APK
      uses: actions/upload-artifact@v4
      with:
        name: signed-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90

    - name: 创建 GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v1.0.${{ github.run_number }}" # 自动生成递增的版本号，如 v1.0.12
        files: app/build/outputs/apk/release/*.apk # 指定要上传的编译产物路径
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## 🎉 自动构建版本
          
          此版本由 GitHub Actions 自动构建，基于 main 分支的最新代码。
          
          ### 📱 APK 文件
          - 构建产物已自动上传
          - 包含签名版本（如已配置签名）
          
          ### 🔧 构建信息
          - **构建编号**: ${{ github.run_number }}
          - **提交**: ${{ github.sha }}
          - **分支**: ${{ github.ref_name }}
          
          ### 📥 安装说明
          下载 APK 文件后，直接安装即可（如已配置签名）。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 无需手动配置，默认自带的权限

    - name: 生成构建报告
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | awk -F'"' '{print $2}')
        VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | awk -F' ' '{print $2}')

        echo "## 🎉 Release 构建完成" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📱 APK 文件信息" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ -f "app/build/outputs/apk/release/app-release-signed.apk" ]; then
          echo "#### ✅ 已签名的版本" >> $GITHUB_STEP_SUMMARY
          echo "- **文件名**: verification-code-app-v${VERSION_NAME}-${VERSION_CODE}-signed.apk" >> $GITHUB_STEP_SUMMARY
          echo "- **状态**: 已签名，可以直接安装" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          echo "#### ⚠️ 未签名的版本" >> $GITHUB_STEP_SUMMARY
          echo "- **文件名**: verification-code-app-v${VERSION_NAME}-${VERSION_CODE}-unsigned.apk" >> $GITHUB_STEP_SUMMARY
          echo "- **状态**: 未签名，需要手动签名后才能安装" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        echo "### 📥 下载方式" >> $GITHUB_STEP_SUMMARY
        echo "1. 在 GitHub Actions 页面下载构建产物" >> $GITHUB_STEP_SUMMARY
        echo "2. 在 GitHub Releases 页面下载" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ ! -f "app/build/outputs/apk/release/app-release-signed.apk" ]; then
          echo "### 🔑 手动签名说明" >> $GITHUB_STEP_SUMMARY
          echo "如需安装未签名的 APK，请先进行签名：" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 方法 1: 使用自动化脚本" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# Linux/Mac' >> $GITHUB_STEP_SUMMARY
          echo './sign-apk.sh' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Windows' >> $GITHUB_STEP_SUMMARY
          echo 'sign-apk.bat' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 方法 2: 使用 apksigner" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'apksigner sign --ks release.keystore --ks-key-alias your-alias --out signed.apk unsigned.apk' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "详细签名指南请参考: [APK_SIGNING_GUIDE.md](https://github.com/huxuyf/verification-code-app/blob/main/APK_SIGNING_GUIDE.md)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        echo "### 📱 系统要求" >> $GITHUB_STEP_SUMMARY
        echo "- Android 13 (API 33) 及以上" >> $GITHUB_STEP_SUMMARY
