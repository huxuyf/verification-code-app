name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-signed-release:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 授予执行权限
      run: chmod +x gradlew

    - name: 生成或验证 debug.keystore
      run: |
        if [ ! -f "app/debug.keystore" ]; then
          echo "🔑 生成 debug.keystore..."
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ debug.keystore 已生成"
        else
          echo "✅ debug.keystore 已存在"
        fi

    - name: 缓存 Gradle 依赖
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 清理旧的构建文件
      run: ./gradlew clean

    - name: 解密签名密钥
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
          echo "✅ 签名密钥已解密"
        else
          echo "⚠️ 未配置签名密钥，将构建未签名的 Release APK"
        fi

    - name: 创建 keystore.properties
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_PASSWORD" ]; then
          cat > app/keystore.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-keystore.jks
          EOF
          echo "✅ keystore.properties 已创建"
        fi

    - name: 构建签名的 Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: 验证 Release APK
      run: |
        if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          echo "✅ Release APK 构建成功"
          ls -lh app/build/outputs/apk/release/app-release-unsigned.apk
        else
          echo "❌ Release APK 构建失败"
          exit 1
        fi

    - name: 重命名 APK
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | awk -F'"' '{print $2}')
        VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | awk -F' ' '{print $2}')
        if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/verification-code-app-v${VERSION_NAME}-${VERSION_CODE}.apk
        fi

    - name: 上传 Release APK
      uses: actions/upload-artifact@v4
      with:
        name: signed-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90

    - name: 创建 GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 生成构建报告
      run: |
        echo "## 🎉 Release 构建完成" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📱 APK 文件信息" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **文件名**: verification-code-app-v${VERSION_NAME}-${VERSION_CODE}.apk" >> $GITHUB_STEP_SUMMARY
        echo "- **位置**: app/build/outputs/apk/release/" >> $GITHUB_STEP_SUMMARY
        echo "- **签名**: 未签名（需要手动签名）" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 下载方式" >> $GITHUB_STEP_SUMMARY
        echo "1. 在 GitHub Actions 页面下载构建产物" >> $GITHUB_STEP_SUMMARY
        echo "2. 在 GitHub Releases 页面下载" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ⚠️ 安装说明" >> $GITHUB_STEP_SUMMARY
        echo "此 APK 未签名，需要先签名才能安装：" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo '# 使用 jarsigner 签名' >> $GITHUB_STEP_SUMMARY
        echo 'jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore your-keystore.jks app-release-unsigned.apk your-alias' >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📱 系统要求" >> $GITHUB_STEP_SUMMARY
        echo "- Android 13 (API 33) 及以上" >> $GITHUB_STEP_SUMMARY
