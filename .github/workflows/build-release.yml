name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-signed-release:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 授予执行权限
      run: chmod +x gradlew

    - name: 缓存 Gradle 依赖
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 解密签名密钥
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
          echo "✅ 签名密钥已解密"
        else
          echo "⚠️ 未配置签名密钥，将构建未签名的 Release APK"
        fi

    - name: 创建 keystore.properties
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_PASSWORD" ]; then
          cat > app/keystore.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-keystore.jks
          EOF
          echo "✅ keystore.properties 已创建"
        fi

    - name: 构建签名的 Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: 重命名 APK
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | awk -F'"' '{print $2}')
        VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | awk -F' ' '{print $2}')
        if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/verification-code-app-v${VERSION_NAME}-${VERSION_CODE}.apk
        fi

    - name: 上传 Release APK
      uses: actions/upload-artifact@v3
      with:
        name: signed-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90

    - name: 创建 GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 生成构建报告
      run: |
        echo "## Release 构建完成" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Release APK 已构建并上传" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 下载方式" >> $GITHUB_STEP_SUMMARY
        echo "1. 在 Actions 页面下载构建产物" >> $GITHUB_STEP_SUMMARY
        echo "2. 或在 Releases 页面下载（如果推送了标签）" >> $GITHUB_STEP_SUMMARY
